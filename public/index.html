<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="StudySnap — A smart flashcard app with spaced repetition to help you study efficiently.">
    <title>StudySnap — Smart Flashcards</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ─── Sidebar Navigation ─── -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">
                    <i data-lucide="zap"></i>
                </div>
                <span class="logo-text">StudySnap</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <a href="#/home" class="nav-link active" data-route="home" id="nav-home">
                <i data-lucide="layout-dashboard"></i>
                <span>Dashboard</span>
            </a>
            <a href="#/stats" class="nav-link" data-route="stats" id="nav-stats">
                <i data-lucide="bar-chart-3"></i>
                <span>Statistics</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-info">
                <i data-lucide="heart"></i>
                <span>Study smart, not hard</span>
            </div>
        </div>
    </aside>

    <!-- ─── Mobile Top Bar ─── -->
    <header class="mobile-header" id="mobile-header">
        <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="Toggle menu">
            <i data-lucide="menu"></i>
        </button>
        <div class="logo">
            <div class="logo-icon"><i data-lucide="zap"></i></div>
            <span class="logo-text">StudySnap</span>
        </div>
        <div style="width:40px"></div>
    </header>

    <!-- ─── Sidebar Overlay (mobile) ─── -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- ─── Main Content Area ─── -->
    <main class="main-content" id="main-content">
        <!-- Views are rendered here by the router -->
        <div class="view-container" id="view-container">
            <div class="loading-screen">
                <div class="spinner"></div>
                <p>Loading StudySnap...</p>
            </div>
        </div>
    </main>

    <!-- ─── Modal Container ─── -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-header" id="modal-header">
                <h2 id="modal-title">Modal</h2>
                <button class="modal-close-btn" id="modal-close-btn" aria-label="Close modal">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Modal content injected by JS -->
            </div>
        </div>
    </div>

    <!-- ─── Toast Container ─── -->
    <div class="toast-container" id="toast-container"></div>

    <!-- ─── Scripts (order matters) ─── -->
    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- App scripts -->
    <script src="js/config.js"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/utils/helpers.js"></script>
    <script src="js/api.js"></script>
    <script src="js/views/home.js"></script>
    <script src="js/views/deck.js"></script>
    <script src="js/views/cardForm.js"></script>
    <script src="js/views/quiz.js"></script>
    <script src="js/views/stats.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
