<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="StudySnap — A smart flashcard app with spaced repetition to help you study efficiently.">
    <title>StudySnap — Smart Flashcards</title>

    <!-- Google Fonts: Sora -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Lucide Icons (CDN) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ─── Top Navigation ─── -->
    <header class="top-nav" id="top-nav">
        <div class="nav-content">
            <div class="nav-left">
                <div class="logo">
                    <div class="logo-icon"><i data-lucide="zap"></i></div>
                    <span class="logo-text">StudySnap</span>
                </div>
                <nav class="top-links">
                    <a href="#/home" class="nav-link active" data-route="home"><i data-lucide="layout-dashboard"></i> Dashboard</a>
                    <a href="#/stats" class="nav-link" data-route="stats"><i data-lucide="bar-chart-3"></i> Statistics</a>
                </nav>
            </div>
            <div class="nav-right">
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle color mode"><i data-lucide="moon"></i></button>
                <button class="settings-btn" aria-label="Settings"><i data-lucide="settings"></i></button>
            </div>
        </div>
    </header>

    <!-- ─── Main Content Area ─── -->
    <main class="main-content" id="main-content">
        <!-- Views are rendered here by the router -->
        <div class="view-container" id="view-container">
            <div class="loading-screen">
                <div class="spinner"></div>
                <p>Loading StudySnap...</p>
            </div>
        </div>
    </main>

    <!-- ─── Modal Container ─── -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal-header" id="modal-header">
                <h2 id="modal-title">Modal</h2>
                <button class="modal-close-btn" id="modal-close-btn" aria-label="Close modal">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Modal content injected by JS -->
            </div>
        </div>
    </div>

    <!-- ─── Toast Container ─── -->
    <div class="toast-container" id="toast-container"></div>

    <!-- ─── Scripts (order matters) ─── -->
    <!-- App scripts -->
    <script src="js/utils/helpers.js"></script>
    <script src="js/api.js"></script>
    <script src="js/views/home.js"></script>
    <script src="js/views/deck.js"></script>
    <script src="js/views/cardForm.js"></script>
    <script src="js/views/quiz.js"></script>
    <script src="js/views/stats.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
